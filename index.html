<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 RynoxMC - Server Minecraft</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="server-card">
            <div class="header">
                <i class="fab fa-discord"></i>
                <h1>🎮 RynoxMC</h1>
            </div>
            
            <div class="server-info">
                <div class="info-item">
                    <i class="fas fa-server"></i>
                    <span class="label">Server IP:</span>
                    <div class="value">rynox.mcsh.io</div>
                </div>
                
                <div class="info-item">
                    <i class="fas fa-users"></i>
                    <span class="label">Discord:</span>
                    <div class="value">
                        <a href="https://discord.gg/t8YaQxZZ" target="_blank">
                            discord.gg/t8YaQxZZ
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="https://discord.gg/t8YaQxZZ" target="_blank" class="btn discord-btn">
                    <i class="fab fa-discord"></i> انضم للديسكورد
                </a>
                <button class="btn copy-ip" onclick="copyIP()">
                    <i class="fas fa-copy"></i> نسخ IP
                </button>
            </div>
            
            <div class="status">
                <span class="status-online">
                    <i class="fas fa-circle"></i> السيرفر شغال ✅
                </span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
